name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%230f766e&color_dots=%23e2e8f0,%23bae6fd,%237dd3fc,%2338bdf8,%230ea5e9
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2314b8a6&color_dots=%230f172a,%231e293b,%23334155,%23475569,%2394a3b8

      - name: Publish snake assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
